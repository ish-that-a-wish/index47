<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index47</title>

    <style>

        :root {
            --bg1:#0f1117;
            --bg2:#090b10;
            --text:#f5f7ff;
            --muted:#9aa4c7;
            --box:rgba(255,255,255,0.04);
            --border:rgba(255,255,255,0.08);
            --accent:#4f7cff;
        }

        body.light {
            --bg1:#edf2ff;
            --bg2:#ffffff;
            --text:#111827;
            --muted:#5b6480;
            --box:rgba(255,255,255,0.75);
            --border:rgba(0,0,0,0.08);
            --accent:#4f7cff;
        }

        *{box-sizing:border-box}

        body{
        margin:0;
        height:100vh;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:Arial;
        color:var(--text);
        background:radial-gradient(circle at top,var(--bg1),var(--bg2));
        }

        .grid{
        position:absolute;
        inset:-50%;
        background-image:linear-gradient(rgba(255,255,255,.02)1px,transparent1px),linear-gradient(90deg,rgba(255,255,255,.02)1px,transparent1px);
        background-size:120px120px;
        transform:rotate(25deg);
        opacity:.3;
        pointer-events:none;
        }

        body.light .grid{
        background-image:linear-gradient(rgba(0,0,0,.03)1px,transparent1px),linear-gradient(90deg,rgba(0,0,0,.03)1px,transparent1px);
        }

        .glow{
        position:absolute;
        width:180px;
        height:180px;
        border-radius:50%;
        background:radial-gradient(circle,rgba(79,124,255,.12),transparent70%);
        filter:blur(40px);
        transform:translate(-50%,-50%);
        pointer-events:none;
        }

        .top{
        position:absolute;
        top:20px;
        right:20px;
        display:flex;
        gap:10px;
        }

        .btn{
        width:44px;
        height:44px;
        border-radius:12px;
        border:1px solid var(--border);
        background:var(--box);
        color:var(--text);
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        text-decoration:none;
        transition:.2s;
        }

        .btn:hover{
        transform:translateY(-2px);
        border-color:rgba(79,124,255,.3);
        }

        .container{
        text-align:center;
        z-index:2;
        }

        img{
        width:280px;
        filter:drop-shadow(0 10px 25px rgba(0,0,0,.3));
        }

        h1{
        margin:16px 0 0;
        letter-spacing:3px;
        font-size:38px;
        }

        p{
        margin-top:10px;
        color:var(--muted);
        letter-spacing:1px;
        font-size:15px;
        }

        .search{
        position:relative;
        margin-top:35px;
        }

        input{
        width:600px;
        max-width:85vw;
        padding:18px 20px;
        border-radius:14px;
        border:1px solid var(--border);
        background:var(--box);
        color:var(--text);
        font-size:16px;
        outline:none;
        backdrop-filter:blur(12px);
        }

        input:focus{
        border-color:rgba(79,124,255,.4);
        }

        .suggestions{
        position:absolute;
        width:100%;
        margin-top:10px;
        background:rgba(20,20,25,.92);
        border:1px solid var(--border);
        border-radius:12px;
        overflow:hidden;
        display:none;
        backdrop-filter:blur(12px);
        }

        body.light .suggestions{
        background:rgba(255,255,255,.92);
        }

        .item{
        padding:14px;
        text-align:left;
        cursor:pointer;
        }

        .item:hover{
        background:rgba(79,124,255,.08);
        }

    </style>

</head>

<body>

<div class="grid"></div>

<div class="glow" id="glow"></div>

<div class="top">

    <button class="btn" onclick="document.body.classList.toggle('light')">◐</button>

    <a class="btn" href="https://github.com/index-47/index47" target="_blank">G</a>

</div>

<div class="container">

    <img src="index.png">

    <h1>INDEX47</h1>

    <p>Your FTC glossary by team 13100</p>

    <div class="search">

        <input id="search" placeholder="Search Index47..." oninput="show()" onkeydown="enter(event)">

        <div class="suggestions" id="box"></div>

    </div>

</div>

<script>

    const pages={
    opr:["opr.html","Offensive Power Rating"],
    cad:["cad.html","Computer Aided Design"],
    sotm:["sotm.html","Shoot on the move"],
    ri3d:["ri3d.html","Robot in 3 days"],
    lut:["lut.html","Lookup Table"]
    swerve:["swerve.html","Swerve"]
    }

    function show(){

    let v=search.value.toLowerCase()
    box.innerHTML=""
    if(!v){box.style.display="none";return}

    let m=Object.keys(pages).filter(k=>k.includes(v)||pages[k][1].toLowerCase().includes(v))

    m.forEach(k=>{
    let d=document.createElement("div")
    d.className="item"
    d.innerText=k.toUpperCase()+" — "+pages[k][1]
    d.onclick=()=>location.href=pages[k][0]
    box.appendChild(d)
    })

    box.style.display=m.length?"block":"none"
    }

    function enter(e){
    if(e.key==="Enter"){
    let v=search.value.toLowerCase()
    if(pages[v])location.href=pages[v][0]
    }
    }

    document.addEventListener("mousemove",e=>{
    glow.style.left=e.clientX+"px"
    glow.style.top=e.clientY+"px"
    })

</script>

</body>

</html>
