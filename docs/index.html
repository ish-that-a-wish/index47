<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index47</title>

    <style>

        :root {
            --bg1: #0b1220;
            --bg2: #05070d;
            --text: white;
            --blue: #6ea8ff;
            --box: rgba(15,20,30,.75);
            --border: rgba(0,140,255,.3);
        }

        body.light {
            --bg1: #edf3ff;
            --bg2: #ffffff;
            --text: #111;
            --blue: #3656c9;
            --box: rgba(255,255,255,.85);
            --border: rgba(0,110,255,.2);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, sans-serif;
            color: var(--text);

            background:
                radial-gradient(circle,
                var(--bg1),
                var(--bg2));

            transition: .3s;
        }

        .grid {
            position: absolute;
            inset: -50%;

            background-image:
                linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);

            background-size: 70px 70px;

            transform: rotate(25deg);
        }

        body.light .grid {
            background-image:
                linear-gradient(rgba(0,0,0,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,.04) 1px, transparent 1px);
        }

        .glow {
            position: absolute;

            width: 300px;
            height: 300px;

            border-radius: 50%;

            background:
                radial-gradient(circle,
                rgba(0,140,255,.35),
                transparent 70%);

            filter: blur(20px);

            pointer-events: none;

            transform: translate(-50%, -50%);
        }

        .top {
            position: absolute;
            top: 20px;
            right: 20px;

            display: flex;
            gap: 10px;
        }

        .btn {
            width: 48px;
            height: 48px;

            border: 1px solid var(--border);
            border-radius: 14px;

            background: var(--box);

            color: var(--text);

            display: flex;
            justify-content: center;
            align-items: center;

            text-decoration: none;

            cursor: pointer;

            backdrop-filter: blur(10px);

            transition: .2s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: rgba(0,140,255,.15);
        }

        .container {
            text-align: center;
            z-index: 2;
        }

        img {
            width: 340px;

            filter:
                drop-shadow(0 0 25px rgba(0,140,255,.45));
        }

        h1 {
            margin: 10px 0 0;

            letter-spacing: 6px;
            font-size: 42px;
        }

        p {
            margin-top: 8px;

            letter-spacing: 4px;
            color: var(--blue);
        }

        .search {
            position: relative;
            margin-top: 35px;
        }

        input {
            width: 600px;
            max-width: 85vw;

            padding: 22px;

            border: 1px solid var(--border);
            border-radius: 18px;

            background: var(--box);

            color: var(--text);

            font-size: 18px;

            outline: none;

            backdrop-filter: blur(10px);

            box-shadow:
                0 0 30px rgba(0,140,255,.15);
        }

        .suggestions {
            position: absolute;

            width: 100%;
            margin-top: 10px;

            background: var(--box);

            border: 1px solid var(--border);
            border-radius: 14px;

            overflow: hidden;

            display: none;

            backdrop-filter: blur(10px);
        }

        .item {
            padding: 14px;
            text-align: left;
            cursor: pointer;
        }

        .item:hover {
            background: rgba(0,140,255,.15);
        }

    </style>
</head>

<body>

<div class="grid"></div>

<div class="glow" id="glow"></div>

<div class="top">

    <button class="btn" onclick="document.body.classList.toggle('light')">
        ◐
    </button>

    <a class="btn"
       href="https://github.com/index-47/index47"
       target="_blank">
        G
    </a>

</div>

<div class="container">

    <img src="index.png">

    <h1>INDEX47</h1>

    <p>Your FTC glossary by team 13100</p>

    <div class="search">

        <input
                id="search"
                type="text"
                placeholder="Search Index47..."
                oninput="showSuggestions()"
                onkeydown="searchEnter(event)"
        >

        <div class="suggestions" id="suggestions"></div>

    </div>

</div>

<script>

    const pages = {

        opr: ["opr.html", "Offensive Power Rating"],
        cad: ["cad.html", "Computer Aided Design"],
        sotm: ["sotm.html", "Shoot on the move"],
        ri3d: ["ri3d.html", "Robot in 3 days"],
        lut: ["lut.html", "Lookup Table"]

    };

    function showSuggestions() {

        const input =
            search.value.toLowerCase();

        suggestions.innerHTML = "";

        if (!input) {
            suggestions.style.display = "none";
            return;
        }

        const matches =
            Object.keys(pages).filter(key =>
                key.includes(input) ||
                pages[key][1].toLowerCase().includes(input)
            );

        matches.forEach(match => {

            const div =
                document.createElement("div");

            div.className = "item";

            div.innerText =
                `${match.toUpperCase()} — ${pages[match][1]}`;

            div.onclick = () =>
                location.href = pages[match][0];

            suggestions.appendChild(div);

        });

        suggestions.style.display =
            matches.length ? "block" : "none";
    }

    function searchEnter(e) {

        if (e.key === "Enter") {

            const input =
                search.value.toLowerCase();

            if (pages[input]) {
                location.href = pages[input][0];
            }
        }
    }

    document.addEventListener("mousemove", e => {

        glow.style.left = e.clientX + "px";
        glow.style.top = e.clientY + "px";

    });

</script>

</body>
</html>
