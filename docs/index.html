<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Index47</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0b1220 0%, #05070d 100%);
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        /* glow effect behind logo */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 40px;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(0,140,255,0.25), transparent 60%);
            filter: blur(20px);
            z-index: 0;
        }

        .logo {
            width: 320px;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 20px rgba(0,140,255,0.4));
        }

        .title {
            margin-top: 10px;
            font-size: 28px;
            letter-spacing: 4px;
            color: #cfd8ff;
        }

        .search-bar {
            margin-top: 30px;
        }

        input {
            width: 420px;
            max-width: 80vw;
            padding: 16px 20px;
            border-radius: 14px;
            border: 1px solid rgba(0,140,255,0.4);
            background: rgba(10, 15, 25, 0.7);
            color: white;
            font-size: 16px;
            outline: none;
            box-shadow: 0 0 25px rgba(0,140,255,0.15);
            transition: 0.3s ease;
        }

        input:focus {
            border-color: rgba(0,140,255,0.9);
            box-shadow: 0 0 35px rgba(0,140,255,0.35);
        }

        input::placeholder {
            color: rgba(180, 190, 255, 0.5);
        }

        .grid-lines {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: rotate(25deg);
            top: -50%;
            left: -50%;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>

<div class="grid-lines"></div>

<div class="container">

    <div class="logo-wrapper">
        <div class="logo-glow"></div>
        <img class="logo" src="/mnt/data/a1019096-07f0-4ea5-8194-70c4fa91a0a5.png" alt="Index47 Logo"/>
    </div>

    <div class="title">INDEX47</div>

    <div class="search-bar">
        <input type="text" placeholder="Search Index47..." />
    </div>

</div>

</body>
</html>
