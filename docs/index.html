<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Index47</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>

    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }

        gtag('js', new Date());

        gtag('config', 'G-XXXXXXXXXX');

    <style>

        :root {
            --bg1: #0b1220;
            --bg2: #05070d;
            --text: white;
            --subtext: #cfd8ff;
            --phrase: #92a3ef;

            --input-bg: rgba(10, 15, 25, 0.75);
            --input-border: rgba(0,140,255,0.4);
            --suggest-bg: rgba(10, 15, 25, 0.92);

            --grid: rgba(255,255,255,0.03);
        }

        body.light-mode {
            --bg1: #edf3ff;
            --bg2: #ffffff;
            --text: #0b1220;
            --subtext: #1f2a4d;
            --phrase: #3656c9;

            --input-bg: rgba(255,255,255,0.8);
            --input-border: rgba(0,110,255,0.3);
            --suggest-bg: rgba(255,255,255,0.95);

            --grid: rgba(0,0,0,0.04);
        }

        body {
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: radial-gradient(circle at center,
                var(--bg1) 0%,
                var(--bg2) 100%);

            font-family: Arial, sans-serif;
            color: var(--text);

            overflow: hidden;
            transition: 0.4s ease;
        }


        .galaxy {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.9;

            box-shadow:
                0 0 10px rgba(0,140,255,0.9),
                0 0 20px rgba(0,140,255,0.45);

            transition: transform 0.08s linear;
        }


        .mouse-glow {
            position: absolute;

            width: 350px;
            height: 350px;

            background:
                radial-gradient(circle,
                rgba(0,140,255,0.35) 0%,
                rgba(0,140,255,0.12) 35%,
                transparent 75%);

            pointer-events: none;

            transform: translate(-50%, -50%);

            z-index: 0;

            filter: blur(20px);
        }


        .mouse-core {
            position: absolute;

            width: 120px;
            height: 120px;

            background:
                radial-gradient(circle,
                rgba(120,190,255,0.55),
                transparent 70%);

            pointer-events: none;

            transform: translate(-50%, -50%);

            z-index: 0;

            filter: blur(8px);
        }

        .grid-lines {
            position: absolute;

            width: 200%;
            height: 200%;

            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);

            background-size: 70px 70px;

            transform: rotate(25deg);

            top: -50%;
            left: -50%;

            z-index: 0;

            pointer-events: none;
        }


        .top-bar {
            position: absolute;

            top: 22px;
            right: 24px;

            display: flex;
            gap: 12px;

            z-index: 20;
        }

        .top-btn {
            width: 48px;
            height: 48px;

            border-radius: 14px;

            border: 1px solid rgba(0,140,255,0.25);

            background: rgba(15,20,30,0.65);

            color: white;

            text-decoration: none;

            display: flex;
            justify-content: center;
            align-items: center;

            cursor: pointer;

            transition: 0.25s ease;

            backdrop-filter: blur(12px);
        }

        body.light-mode .top-btn {
            background: rgba(255,255,255,0.8);
            color: #111;
        }

        .top-btn:hover {
            background: rgba(0,140,255,0.15);

            transform:
                translateY(-2px)
                scale(1.05);
        }

        .theme-icon,
        .github-icon {
            width: 22px;
            height: 22px;
        }

        .sun-icon {
            display: none;
        }

        body.light-mode .sun-icon {
            display: block;
        }

        body.light-mode .moon-icon {
            display: none;
        }


        .container {
            text-align: center;

            transform: scale(0.7142857);

            position: relative;
            z-index: 2;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;

            margin-bottom: 50px;
        }

        .logo-glow {
            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            width: 600px;
            height: 600px;

            background:
                radial-gradient(circle,
                rgba(0,140,255,0.25),
                transparent 60%);

            filter: blur(25px);

            z-index: 0;
        }

        .logo {
            width: 420px;

            position: relative;
            z-index: 1;

            filter:
                drop-shadow(0 0 25px rgba(0,140,255,0.5));
        }

        .title {
            margin-top: 10px;

            font-size: 40px;
            letter-spacing: 6px;

            color: var(--subtext);
        }

        .phrase {
            margin-top: 7.5px;

            font-size: 20px;
            letter-spacing: 6px;

            color: var(--phrase);

            filter:
                drop-shadow(0 0 25px rgba(0,140,255,0.5));
        }

        .search-bar {
            margin-top: 40px;
            position: relative;
        }

        input {
            width: 600px;
            max-width: 85vw;

            padding: 22px 26px;

            border-radius: 18px;

            border: 1px solid var(--input-border);

            background: var(--input-bg);

            color: var(--text);

            font-size: 20px;

            outline: none;

            box-shadow:
                0 0 35px rgba(0,140,255,0.2);

            transition: 0.3s ease;
        }

        input:focus {
            border-color: rgba(0,140,255,0.9);

            box-shadow:
                0 0 50px rgba(0,140,255,0.4);
        }

        input::placeholder {
            color: rgba(180,190,255,0.5);
        }


        .suggestions {
            position: absolute;

            width: 600px;
            max-width: 85vw;

            margin-top: 10px;

            background: var(--suggest-bg);

            border: 1px solid rgba(0,140,255,0.25);

            border-radius: 14px;

            overflow: hidden;

            display: none;

            box-shadow:
                0 0 30px rgba(0,140,255,0.15);

            backdrop-filter: blur(10px);

            z-index: 10;
        }

        .suggestion-item {
            padding: 14px 16px;

            cursor: pointer;

            text-align: left;

            font-size: 15px;

            color: var(--text);

            transition: 0.2s;
        }

        .suggestion-item:hover {
            background: rgba(0,140,255,0.15);
        }

    </style>
</head>

<body>

<div class="galaxy" id="galaxy"></div>

<div class="mouse-glow" id="mouseGlow"></div>
<div class="mouse-core" id="mouseCore"></div>

<div class="grid-lines"></div>


<div class="top-bar">


    <button class="top-btn" onclick="toggleTheme()">


        <svg class="theme-icon moon-icon"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24"
             fill="currentColor">

            <path d="M21 12.79A9 9 0 0 1 11.21 3
                     7 7 0 1 0 21 12.79z"/>

        </svg>

        <svg class="theme-icon sun-icon"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24"
             fill="none"
             stroke="currentColor"
             stroke-width="2">

            <circle cx="12" cy="12" r="4"/>

            <line x1="12" y1="2" x2="12" y2="4"/>
            <line x1="12" y1="20" x2="12" y2="22"/>

            <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/>
            <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/>

            <line x1="2" y1="12" x2="4" y2="12"/>
            <line x1="20" y1="12" x2="22" y2="12"/>

            <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/>
            <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>

        </svg>

    </button>


    <a class="top-btn"
       href="https://github.com/index-47/index47"
       target="_blank">

        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24"
             fill="currentColor"
             class="github-icon">

            <path d="M12 .5C5.65.5.5 5.65.5 12
                     c0 5.09 3.29 9.41 7.86 10.94
                     .58.1.79-.25.79-.56
                     0-.28-.01-1.02-.02-2
                     -3.2.69-3.88-1.54-3.88-1.54
                     -.52-1.32-1.27-1.67-1.27-1.67
                     -1.04-.71.08-.7.08-.7
                     1.15.08 1.75 1.18 1.75 1.18
                     1.02 1.75 2.67 1.24 3.32.95
                     .1-.74.4-1.24.72-1.53
                     -2.55-.29-5.23-1.28-5.23-5.7
                     0-1.26.45-2.3 1.18-3.11
                     -.12-.29-.51-1.47.11-3.06
                     0 0 .97-.31 3.19 1.19
                     .93-.26 1.92-.39 2.91-.39
                     .99 0 1.98.13 2.91.39
                     2.22-1.5 3.19-1.19 3.19-1.19
                     .62 1.59.23 2.77.11 3.06
                     .73.81 1.18 1.85 1.18 3.11
                     0 4.43-2.69 5.4-5.25 5.69
                     .41.35.78 1.04.78 2.1
                     0 1.52-.01 2.75-.01 3.13
                     0 .31.21.67.8.56
                     4.56-1.53 7.85-5.85 7.85-10.94
                     C23.5 5.65 18.35.5 12 .5z"/>

        </svg>

    </a>

</div>

<div class="container">

    <div class="logo-wrapper">

        <div class="logo-glow"></div>

        <img class="logo" src="index.png" />

    </div>

    <div class="title">INDEX47</div>

    <div class="phrase">
        Your FTC glossary by team 13100
    </div>

    <div class="search-bar">

        <input id="search"
               type="text"
               placeholder="Search Index47..."
               oninput="showSuggestions()"
               onkeydown="handleEnter(event)" />

        <div id="suggestions" class="suggestions"></div>

    </div>

</div>

<script>

    const pages = {

        "opr": {
            title: "OPR",
            page: "opr.html",
            desc: "Offensive Power Rating"
        },

        "cad": {
            title: "CAD",
            page: "cad.html",
            desc: "Computer Aided Design"
        },

        "sotm": {
            title: "SOTM",
            page: "sotm.html",
            desc: "Shoot on the move"
        },

        "ri3d": {
            title: "RI3D",
            page: "ri3d.html",
            desc: "Robot in 3 days"
        },

        "lut": {
            title: "LUT",
            page: "lut.html",
            desc: "Lookup Table"
        }

    };

    function showSuggestions() {

        const input =
            document.getElementById("search")
            .value
            .toLowerCase();

        const box =
            document.getElementById("suggestions");

        box.innerHTML = "";

        if (!input) {

            box.style.display = "none";

            return;
        }

        const matches =
            Object.keys(pages).filter(key =>

                key.includes(input) ||

                pages[key]
                .desc
                .toLowerCase()
                .includes(input)
            );

        if (matches.length === 0) {

            box.style.display = "none";

            return;
        }

        matches.forEach(match => {

            const item =
                document.createElement("div");

            item.className = "suggestion-item";

            item.innerText =
                `${pages[match].title} — ${pages[match].desc}`;

            item.onclick = () => {

                window.location.href =
                    pages[match].page;
            };

            box.appendChild(item);

        });

        box.style.display = "block";
    }

    function handleEnter(event) {

        if (event.key === "Enter") {

            const input =
                document.getElementById("search")
                .value
                .toLowerCase();

            if (pages[input]) {

                window.location.href =
                    pages[input].page;
            }
        }
    }


    function toggleTheme() {

        document.body.classList.toggle("light-mode");
    }


    const galaxy =
        document.getElementById("galaxy");

    for (let i = 0; i < 170; i++) {

        const star =
            document.createElement("div");

        star.classList.add("star");

        const size =
            Math.random() * 2.5 + 1;

        star.style.width = size + "px";
        star.style.height = size + "px";

        star.style.left =
            Math.random() * window.innerWidth + "px";

        star.style.top =
            Math.random() * window.innerHeight + "px";

        galaxy.appendChild(star);
    }

    const stars =
        document.querySelectorAll(".star");

    const glow =
        document.getElementById("mouseGlow");

    const core =
        document.getElementById("mouseCore");

    document.addEventListener("mousemove", (e) => {

        glow.style.left = e.clientX + "px";
        glow.style.top = e.clientY + "px";

        core.style.left = e.clientX + "px";
        core.style.top = e.clientY + "px";

        const x =
            (e.clientX / window.innerWidth - 0.5) * 75;

        const y =
            (e.clientY / window.innerHeight - 0.5) * 75;

        stars.forEach((star, index) => {

            const speed =
                (index % 5) + 1;

            star.style.transform =
                `translate(${x / speed}px,
                            ${y / speed}px)`;
        });
    });

</script>

</body>
</html>
