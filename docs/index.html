<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Index47</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0b1220 0%, #05070d 100%);
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .grid-lines {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 70px 70px;
            transform: rotate(25deg);
            top: -50%;
            left: -50%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            text-align: center;
            transform: scale(0.7142857);
            position: relative;
            z-index: 1;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 50px;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,140,255,0.25), transparent 60%);
            filter: blur(25px);
            z-index: 0;
        }

        .logo {
            width: 420px;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 25px rgba(0,140,255,0.5));
        }

        .title {
            margin-top: 10px;
            font-size: 40px;
            letter-spacing: 6px;
            color: #cfd8ff;
        }
        .phrase {
            margin-top: 7.5px;
            font-size: 20px;
            letter-spacing: 6px;
            color: #c1cbf8;
        }

        .search-bar {
            margin-top: 40px;
            position: relative;
        }

        input {
            width: 600px;
            max-width: 85vw;
            padding: 22px 26px;
            border-radius: 18px;
            border: 1px solid rgba(0,140,255,0.4);
            background: rgba(10, 15, 25, 0.75);
            color: white;
            font-size: 20px;
            outline: none;
            box-shadow: 0 0 35px rgba(0,140,255,0.2);
            transition: 0.3s ease;
        }

        input:focus {
            border-color: rgba(0,140,255,0.9);
            box-shadow: 0 0 50px rgba(0,140,255,0.4);
        }

        input::placeholder {
            color: rgba(180, 190, 255, 0.5);
        }

        .suggestions {
            position: absolute;
            width: 600px;
            max-width: 85vw;
            margin-top: 10px;
            background: rgba(10, 15, 25, 0.92);
            border: 1px solid rgba(0,140,255,0.25);
            border-radius: 14px;
            overflow: hidden;
            display: none;
            box-shadow: 0 0 30px rgba(0,140,255,0.15);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .suggestion-item {
            padding: 14px 16px;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
            color: rgba(220,230,255,0.85);
            transition: 0.2s;
        }

        .suggestion-item:hover {
            background: rgba(0,140,255,0.15);
        }
    </style>
</head>

<body>

<div class="grid-lines"></div>

<div class="container">

    <div class="logo-wrapper">
        <div class="logo-glow"></div>
        <img class="logo" src="index.png" />
    </div>

    <div class="title">INDEX47</div>
    <div class="phrase">Your FTC glossary by team 13100</div>



    <div class="search-bar">
        <input id="search"
               type="text"
               placeholder="Search Index47..."
               oninput="showSuggestions()"
               onkeydown="handleEnter(event)" />

        <div id="suggestions" class="suggestions"></div>
    </div>

</div>

<script>
    const pages = {
        "opr": {
            title: "OPR",
            page: "opr.html",
            desc: "Offensive Power Rating"
        },
        "cad": {
            title: "CAD",
            page: "cad.html",
            desc: "Computer Aided Design"
        },
        "sotm": {
            title: "SOTM",
            page: "sotm.html",
            desc: "Shoot on the move"
        },
        "ri3d": {
            title: "RI3D",
            page: "ri3d.html",
            desc: "Robot in 3 days"
        },
        "lut": {
            title: "LUT",
            page: "lut.html",
            desc: "Lookup Table"
        }
    // Add your search in the same format as above, replace desc with short description if not acroynym
    };

    function showSuggestions() {
        const input = document.getElementById("search").value.toLowerCase();
        const box = document.getElementById("suggestions");

        box.innerHTML = "";

        if (!input) {
            box.style.display = "none";
            return;
        }

        const matches = Object.keys(pages).filter(key =>
            key.includes(input) || pages[key].desc.toLowerCase().includes(input)
        );

        if (matches.length === 0) {
            box.style.display = "none";
            return;
        }

        matches.forEach(match => {
            const item = document.createElement("div");
            item.className = "suggestion-item";
            item.innerText = `${pages[match].title} — ${pages[match].desc}`;

            item.onclick = () => {
                window.location.href = pages[match].page;
            };

            box.appendChild(item);
        });

        box.style.display = "block";
    }

    function handleEnter(event) {
        if (event.key === "Enter") {
            const input = document.getElementById("search").value.toLowerCase();

            if (pages[input]) {
                window.location.href = pages[input].page;
            }
        }
    }
</script>

</body>
</html>
